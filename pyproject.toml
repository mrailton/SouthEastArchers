[project]
name = "south-east-archers"
version = "0.1.0"
description = "Django-based web application for managing an archery club"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "cookiecutter>=2.6.0",
    "cryptography>=46.0.3",
    "django>=5.2.8",
    "django-tailwind[reload]>=4.4.1",
    "gunicorn>=23.0.0",
    "pillow>=12.0.0",
    "pymysql>=1.1.2",
    "pytest>=9.0.0",
    "pytest-cov>=7.0.0",
    "pytest-django>=4.11.1",
    "python-decouple>=3.8",
    "whitenoise>=6.11.0",
]
