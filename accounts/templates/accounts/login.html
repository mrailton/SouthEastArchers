{% extends 'base.html' %}

{% block title %}Login - South East Archers{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
            <div class="px-8 py-6">
                <h2 class="text-2xl font-bold text-center mb-6">Login</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_email" class="block text-gray-700 font-medium mb-2">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-6">
                        <label for="id_password" class="block text-gray-700 font-medium mb-2">Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Login</button>
                </form>
                <hr class="my-6 border-gray-300">
                <p class="text-center text-gray-600">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
