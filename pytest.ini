[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings
    -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    ignore::ResourceWarning
markers =
    slow: marks tests as slow
    unit: marks tests as unit tests (models, pure logic)
    integration: marks tests as integration tests (services, repositories, events, CLI)
    e2e: marks tests as end-to-end tests (routes, HTTP client)
