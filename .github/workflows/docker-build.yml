name: Build, Test, and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

      - name: Create Docker network
        run: docker network create test-network

      - name: Start MySQL for testing
        run: |
          docker run -d \
            --name mysql \
            --network test-network \
            -e MYSQL_ROOT_PASSWORD=test_mysql_password \
            -e MYSQL_DATABASE=test_southeast_archers \
            --health-cmd="mysqladmin ping -h localhost -ptest_mysql_password" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=10 \
            mysql:8.0

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          timeout 60s bash -c 'until docker exec mysql mysqladmin ping -h localhost -ptest_mysql_password --silent 2>/dev/null; do sleep 2; echo "Waiting..."; done'
          echo "MySQL is ready!"

      - name: Run database migrations
        run: |
          docker run --rm \
            --network test-network \
            -e DEBUG=False \
            -e SECRET_KEY=test-secret-key-for-github-actions-only \
            -e DB_NAME=test_southeast_archers \
            -e DB_USER=root \
            -e DB_PASSWORD=test_mysql_password \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            ${{ steps.image.outputs.name }}:test \
            python manage.py migrate --noinput

      - name: Test application startup
        run: |
          docker run -d \
            --name test-app \
            --network test-network \
            -e DEBUG=False \
            -e SECRET_KEY=test-secret-key-for-github-actions-only \
            -e DB_NAME=test_southeast_archers \
            -e DB_USER=root \
            -e DB_PASSWORD=test_mysql_password \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            -p 8000:8000 \
            ${{ steps.image.outputs.name }}:test

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          timeout 60s bash -c 'until curl -f http://localhost:8000/health/ 2>/dev/null; do sleep 2; echo "Waiting..."; done'
          echo "Application is ready!"

      - name: Test health endpoint
        run: |
          response=$(curl -s http://localhost:8000/health/)
          echo "Health check response: $response"
          if echo "$response" | grep -q "healthy"; then
            echo "✓ Health check passed"
          else
            echo "✗ Health check failed"
            exit 1
          fi

      - name: Test homepage
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/)
          echo "Homepage status: $status"
          if [ "$status" -eq 200 ]; then
            echo "✓ Homepage accessible"
          else
            echo "✗ Homepage returned status $status"
            exit 1
          fi

      - name: Show application logs on failure
        if: failure()
        run: |
          echo "=== Application Logs ==="
          docker logs test-app || true
          echo ""
          echo "=== MySQL Logs ==="
          docker logs mysql || true

      - name: Cleanup test containers
        if: always()
        run: |
          docker stop test-app mysql 2>/dev/null || true
          docker rm test-app mysql 2>/dev/null || true
          docker network rm test-network 2>/dev/null || true

      - name: Build and push multi-arch Docker image
        if: github.event_name != 'pull_request'
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo ${{ steps.build-and-push.outputs.digest }}

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Docker Image Published! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy to Coolify:**" >> $GITHUB_STEP_SUMMARY
          echo "The image is now available in GHCR and ready for deployment!" >> $GITHUB_STEP_SUMMARY
