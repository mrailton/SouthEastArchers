services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/__pycache__
    env_file: .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    entrypoint: /app/docker-entrypoint.dev.sh
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sea_db
      MYSQL_USER: sea_user
      MYSQL_PASSWORD: sea_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  mysql_data:
  node_modules:
