[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings
    -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    ignore::ResourceWarning
markers =
    slow: marks tests as slow
    unit: marks tests as unit tests (models, services, repositories, events, CLI)
    feature: marks tests as feature tests (HTTP client against FastAPI app)
